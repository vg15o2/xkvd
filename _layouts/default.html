<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/xkcd.css' | relative_url }}">
  <link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
</head>
<body>
  <header id="topcontainer">
    <div id="masthead">
      <a href="{{ '/' | relative_url }}"><span id="site-title">{{ site.title }}</span></a>
      <span id="site-tagline">{{ site.tagline }}</span>
    </div>
  </header>

  <main id="middlecontainer">
    {{ content }}
  </main>

  <footer id="bottom">
    <p>
      Comics auto-generated from
      {% if site.letterboxd_username and site.letterboxd_username != "" %}
        <a href="https://letterboxd.com/{{ site.letterboxd_username }}/">my Letterboxd reviews</a>.
      {% else %}
        my Letterboxd reviews.
      {% endif %}
      Built with Jekyll. Heavily inspired by <a href="https://xkcd.com/">xkcd</a>.
    </p>
  </footer>
</body>
</html>
